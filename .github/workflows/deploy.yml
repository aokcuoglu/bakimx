name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR namespace must equal the repo owner (aokcuoglu); this resolves to
  # ghcr.io/aokcuoglu/app and must stay in sync with docker-compose.yml.
  IMAGE_NAME: ${{ github.repository_owner }}/app

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Prod compose pulls `:latest`. `sha` keeps an immutable handle per deploy
          # for rollback. Releases are now main-push driven (not v* tags), so the
          # semver patterns are gone — tag the repo for version records if you like,
          # but tags no longer trigger a deploy.
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SESSION_SECRET=build_time_placeholder_at_least_32_chars_long__

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Serialize VPS deploys across BOTH workflows (prod + staging share this group).
    # Prod and staging run on the same VPS and pull the same `app` image layers;
    # two concurrent `docker compose pull` race the containerd snapshotter and one
    # fails with "lchown ... no such file or directory". cancel-in-progress:false
    # queues the second deploy instead of cancelling it.
    concurrency:
      group: vps-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Sync the compose file to the VPS so it matches the repo (the VPS keeps its own
      # .env.production). Without this, a compose change in the repo (e.g. adding the
      # `migrate` service) never reaches the VPS and the deploy script breaks.
      - name: Sync compose to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/bakimx/
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/bakimx
            docker compose --env-file .env.production pull app
            # Apply pending migrations BEFORE recreating the app. `set -e` aborts the
            # whole script on failure, leaving the running app untouched (no downtime).
            docker compose --env-file .env.production run --rm migrate
            docker compose --env-file .env.production up -d app --force-recreate
            # Dangling images only. NEVER run an unfiltered `docker system prune`
            # here — this VPS also hosts the getirbakim stack and a system prune
            # would delete its images/cache/networks too.
            docker image prune -f
            echo "Deployed at $(date)"