name: Deploy to Staging

on:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/app

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SESSION_SECRET=build_time_placeholder_at_least_32_chars_long__
            SESSION_COOKIE_NAME=bakimx_session_staging
            SESSION_COOKIE_DOMAIN=staging.app.bakimx.com

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Sync the staging compose to the VPS (it keeps its own .env.staging). The SSH
      # script targets it with -f. /opt/bakimx-staging must exist (see docs/STAGING-SETUP.md).
      - name: Sync staging compose to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.staging.yml
          target: /opt/bakimx-staging/
      - name: Deploy to VPS (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/bakimx-staging
            docker compose -f docker-compose.staging.yml --env-file .env.staging pull app
            docker compose -f docker-compose.staging.yml --env-file .env.staging run --rm migrate
            docker compose -f docker-compose.staging.yml --env-file .env.staging up -d app --force-recreate
            # Dangling images only. NEVER an unfiltered `docker system prune` — this VPS
            # also hosts the getirbakim stack and a system prune would wipe its images too.
            docker image prune -f
            echo "Staging deployed at $(date)"
