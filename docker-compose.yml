services:
  app:
    image: ghcr.io/aokcuoglu/app:latest
    restart: unless-stopped
    env_file: .env.production
    # Cap memory so a bakimx spike can't OOM-starve the co-hosted getirbakim stack.
    # Compose v2 enforces this on `docker compose up`. 2g leaves headroom for
    # sharp/heic-convert image processing on photo uploads — load-test before lowering.
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      db:
        condition: service_healthy
    networks:
      internal:
      # Stable alias on the shared Caddy network so the reverse proxy can target
      # `bakimx-app:3000` without colliding with other stacks' `app` services.
      proxy:
        aliases:
          - bakimx-app

  # One-shot DB migration. Run BEFORE recreating `app` at deploy time:
  #   docker compose run --rm migrate
  # `tools` profile keeps it out of `docker compose up`. Idempotent (migrate deploy
  # applies only pending migrations). Uses the same image:tag as `app`.
  migrate:
    image: ghcr.io/aokcuoglu/app:latest
    profiles: ["tools"]
    restart: "no"
    env_file: .env.production
    command: ["prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bakimx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-bakimx}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bakimx}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
  proxy:
    external: true
    name: getirbakim_app-network