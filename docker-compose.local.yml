services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bakimx
      POSTGRES_PASSWORD: bakimx
      POSTGRES_DB: bakimx
    ports:
      - "5432:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakimx"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_local: